# Gradle / JVM
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Parchment mappings — readable parameter names + javadoc.
# https://parchmentmc.org/docs/getting-started
parchment_minecraft_version=1.21.1
parchment_mappings_version=2024.11.17

# Minecraft / NeoForge
# Latest at https://projects.neoforged.net/neoforged/neoforge
minecraft_version=1.21.1
minecraft_version_range=[1.21.1]
neo_version=21.1.228
loader_version_range=[1,)

# Mod
mod_id=dungeontrain
mod_name=Dungeon Train
mod_license=PolyForm Shield 1.0.0
mod_version=0.80.13
mod_group_id=games.brennan.dungeontrain
mod_authors=Brennan Hatton
mod_description=A Minecraft port of Dungeon Train (brennanhatton.itch.io/dungeontrain) - a moving train that hosts procedurally generated dungeons.

# Sable — replaces Valkyrien Skies as the physics dependency in Phase 2 of the
# 1.21.1 migration. VS upstream (https://github.com/ValkyrienSkies/Valkyrien-Skies-2)
# is still 1.20.1-only as of 2026-04-28; Sable (https://github.com/ryanhcode/sable,
# PolyForm Shield 1.0.0) actively ships NeoForge 1.21.1 builds.
# Modrinth project: https://modrinth.com/mod/sable
sable_version=1.2.1+mc1.21.1

# VS deps kept commented for archival reference only — the project does not plan
# to re-adopt VS unless Sable proves untenable. To re-enable, uncomment in build.gradle
# and add a corresponding [[dependencies]] block in neoforge.mods.toml.
# vs_version=
# vs_core_version=
# kff_version=6.0.0
