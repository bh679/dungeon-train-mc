// Dungeon Train — Minecraft mod (Forge 1.20.1)
// Powered by Valkyrien Skies 2

plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0.16,6.2)'
    // Mixin gradle plugin — wires Mixin's annotation processor and, critically for our
    // case, passes the SRG↔mojmap refMap remap file to runClient's JVM args so VS's
    // refmap entries (SRG method names like m_91277_) resolve to mojmap class members
    // (startUseItem) at @WrapOperation validation time.
    id 'org.spongepowered.mixin' version '0.7.+'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: mapping_channel, version: mapping_version

    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            property 'forge.enabledGameTestNamespaces', mod_id

            mods {
                "${mod_id}" {
                    source sourceSets.main
                }
            }
        }

        client {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        server {
            property 'forge.enabledGameTestNamespaces', mod_id
            args '--nogui'
        }

        gameTestServer {
            property 'forge.enabledGameTestNamespaces', mod_id
        }

        data {
            workingDirectory project.file('run-data')
            args '--mod', mod_id, '--all', '--output', file('src/generated/resources/'), '--existing', file('src/main/resources/')
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

// Mixin plugin configuration
// We register an (initially empty) mixin config for our own mod so the mixin
// plugin activates the runtime refmap remap file for runClient/runServer.
// This benefits VS too — VS's refmap becomes resolvable against mojmap class members.
mixin {
    add sourceSets.main, "${mod_id}.refmap.json"
    config "${mod_id}.mixins.json"
}

repositories {
    maven {
        name = 'Minecraft Forge'
        url = 'https://maven.minecraftforge.net/'
    }
    maven {
        name = 'ParchmentMC'
        url = 'https://maven.parchmentmc.org/'
    }
    maven {
        name = 'Valkyrien Skies'
        url = 'https://maven.valkyrienskies.org/'
    }
    maven {
        name = 'Kotlin for Forge'
        url = 'https://thedarkcolour.github.io/KotlinForForge/'
    }
    mavenCentral()
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    // Mixin annotation processor — pairs with the 'org.spongepowered.mixin' plugin.
    // Required for the mixin plugin to generate a refmap for our own mod AND to wire
    // up the runtime refMapRemappingFile JVM arg that lets VS's refmap resolve.
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    // Kotlin for Forge — required by Valkyrien Skies
    implementation "thedarkcolour:kotlinforforge:${kff_version}"

    // Valkyrien Skies 2 — moving ship/train physics
    implementation fg.deobf("org.valkyrienskies:valkyrienskies-120-forge:${vs_version}") {
        exclude group: 'com.simibubi'
        exclude group: 'dev.engine-room'
        exclude group: 'com.jozufozu'
    }

    // VSCore — required runtime deps of Valkyrien Skies
    implementation("org.valkyrienskies.core:api:${vs_core_version}")      { exclude group: 'org.joml' }
    implementation("org.valkyrienskies.core:internal:${vs_core_version}") { exclude group: 'org.joml' }
    implementation("org.valkyrienskies.core:util:${vs_core_version}")     { exclude group: 'org.joml' }

    // Compile-only: joml-primitives supplies AABBdc used by Ship.getWorldAABB().
    // VS ships this jar-in-jar at runtime (META-INF/jars/joml-primitives-1.10.0.jar),
    // so we only need it for compilation.
    compileOnly 'org.joml:joml-primitives:1.10.0'
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
        minecraft_version       : minecraft_version,
        minecraft_version_range : minecraft_version_range,
        forge_version           : forge_version,
        forge_version_range     : forge_version_range,
        loader_version_range    : loader_version_range,
        mod_id                  : mod_id,
        mod_name                : mod_name,
        mod_license             : mod_license,
        mod_version             : mod_version,
        mod_authors             : mod_authors,
        mod_description         : mod_description,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
            'Specification-Title'     : mod_id,
            'Specification-Vendor'    : mod_authors,
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.name,
            'Implementation-Version'  : project.jar.archiveVersion,
            'Implementation-Vendor'   : mod_authors,
        ])
    }
    finalizedBy 'reobfJar'
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven { url "file://${project.projectDir}/repo" }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
