// Dungeon Train — Minecraft mod (NeoForge 1.21.1)
// MIGRATION PHASE 1: VS adapter is stubbed; ship/vs/* will be reactivated in Phase 2
// once VS upstream releases a 1.21.1 / NeoForge build. See plans/ticklish-soaring-comet.md.

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

sourceSets.main.resources {
    srcDir 'src/generated/resources'
    exclude '**/*.bbmodel'
    exclude 'src/generated/**/.cache'
}

repositories {
    // Maven Central for general libs (joml-primitives, JUnit).
    mavenCentral()

    // VS / KFF repos kept here (commented) so Phase 2 can re-enable in one diff:
    // maven { name = 'Valkyrien Skies'; url = 'https://maven.valkyrienskies.org/' }
    // maven { name = 'Kotlin for Forge'; url = 'https://thedarkcolour.github.io/KotlinForForge/' }
}

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        gameTestServer {
            type = 'gameTestServer'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all',
                '--output', file('src/generated/resources/').getAbsolutePath(),
                '--existing', file('src/main/resources/').getAbsolutePath()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // joml-primitives supplies AABBdc used by ManagedShip.worldAABB().
    // Pre-migration this came in transitively via VS jar-in-jar; with VS
    // stubbed we add it ourselves. `additionalRuntimeClasspath` is needed in
    // addition to compile/runtime so it lands on the moddev launch classpath
    // (runClient / runServer); plain `runtimeOnly` is not enough there.
    // `jarJar` embeds it in the shipped mod jar for end-user production builds.
    compileOnly 'org.joml:joml-primitives:1.10.0'
    additionalRuntimeClasspath 'org.joml:joml-primitives:1.10.0'
    jarJar(group: 'org.joml', name: 'joml-primitives', version: '[1.10.0,2.0)') {
        version {
            prefer '1.10.0'
        }
    }

    // VS dependencies — DISABLED for Phase 1, restore in Phase 2:
    // implementation "org.valkyrienskies:valkyrienskies-121-neoforge:${vs_version}"
    // implementation("org.valkyrienskies.core:api:${vs_core_version}")      { exclude group: 'org.joml' }
    // implementation("org.valkyrienskies.core:internal:${vs_core_version}") { exclude group: 'org.joml' }
    // implementation("org.valkyrienskies.core:util:${vs_core_version}")     { exclude group: 'org.joml' }
    // implementation "thedarkcolour:kotlinforforge-neoforge:${kff_version}"

    // Unit tests — JUnit 5 Jupiter (pure-logic only).
    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test', Test).configure {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
}

// Resolve the current git branch at configuration time so it can be baked into
// the jar via processResources. Falls back to the short SHA on detached HEAD.
def gitBranch = { ->
    try {
        def proc = ['git', 'rev-parse', '--abbrev-ref', 'HEAD']
                .execute(null, project.projectDir)
        proc.waitForOrKill(5000)
        def name = proc.in.text.trim()
        if (name == 'HEAD' || name.isEmpty()) {
            def p2 = ['git', 'rev-parse', '--short', 'HEAD']
                    .execute(null, project.projectDir)
            p2.waitForOrKill(5000)
            def sha = p2.in.text.trim()
            return sha ?: 'unknown'
        }
        return name
    } catch (Exception e) {
        logger.warn("Could not resolve git branch for version resource: {}", e.message)
        return 'unknown'
    }
}()

// Generate neoforge.mods.toml + dungeontrain_version.properties + pack.mcmeta from templates.
tasks.register('generateModMetadata', ProcessResources) {
    var replaceProperties = [
        minecraft_version       : minecraft_version,
        minecraft_version_range : minecraft_version_range,
        neo_version             : neo_version,
        loader_version_range    : loader_version_range,
        mod_id                  : mod_id,
        mod_name                : mod_name,
        mod_license             : mod_license,
        mod_version             : mod_version,
        mod_authors             : mod_authors,
        mod_description         : mod_description,
        git_branch              : gitBranch,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from 'src/main/templates'
    into "${layout.buildDirectory.get()}/generated/sources/modMetadata"
}
sourceSets.main.resources.srcDir tasks.named('generateModMetadata')
neoForge.ideSyncTask tasks.named('generateModMetadata')

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
            'Specification-Title'     : mod_id,
            'Specification-Vendor'    : mod_authors,
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.name,
            'Implementation-Version'  : project.jar.archiveVersion,
            'Implementation-Vendor'   : mod_authors,
        ])
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven { url "file://${project.projectDir}/repo" }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
