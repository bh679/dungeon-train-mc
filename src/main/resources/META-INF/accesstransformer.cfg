# Dungeon Train — access transformers (single source of truth for BOTH loaders).
#
# ⚠ Fabric parity: every entry here widens a vanilla member so loader-neutral
# :common code can touch it. On NeoForge this file is auto-applied (default
# location src/main/resources/META-INF/accesstransformer.cfg) and :common reads
# it via common/build.gradle's neoForge.accessTransformers.from(...). The Fabric
# module has NO access transformers — it uses an access-WIDENER instead — so ANY
# entry added below MUST get a matching line in the Fabric access-widener
# (Stage 4e: fabric/src/main/resources/dungeontrain.accesswidener) or the widened
# access will not exist at runtime on Fabric and :common code will crash there.
#
# Format: <access> <fully.qualified.Class> <member>  (Mojang-named, 1.21.1).

# Screen.renderables — DT screens (NarrativeDeathScreen, RideGalleryScreen)
# iterate the widget list directly to drive custom hover/tooltip logic.
public net.minecraft.client.gui.screens.Screen renderables

# CreativeModeTabs tab keys — ModItems adds the variant clipboard to
# TOOLS_AND_UTILITIES and ModBlocks adds narrative_lectern to FUNCTIONAL_BLOCKS
# via the BuildCreativeModeTabContents hook (compared by ResourceKey identity).
public net.minecraft.world.item.CreativeModeTabs FUNCTIONAL_BLOCKS
public net.minecraft.world.item.CreativeModeTabs TOOLS_AND_UTILITIES

# UseOnContext 5-arg (protected) ctor — VariantBlockInteractions synthesizes a
# use-on-block context to drive editor block placement server-side.
public net.minecraft.world.item.context.UseOnContext <init>(Lnet/minecraft/world/level/Level;Lnet/minecraft/world/entity/player/Player;Lnet/minecraft/world/InteractionHand;Lnet/minecraft/world/item/ItemStack;Lnet/minecraft/world/phys/BlockHitResult;)V
