modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/bh679/dungeon-train-mc/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''
displayURL="https://github.com/bh679/dungeon-train-mc"
credits="Original game by Brennan Hatton (brennanhatton.itch.io/dungeontrain)."
logoFile="logo.png"

[[dependencies.${mod_id}]]
    modId="sable"
    type="required"
    versionRange="[1.2.1,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="adventureitemnames"
    type="required"
    versionRange="[${adventureitemnames_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="adventureitemstats"
    type="required"
    versionRange="[${adventureitemstats_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="playermob"
    type="required"
    versionRange="[${playermob_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="discordpresence"
    type="required"
    versionRange="[${discordpresence_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Optional, player-installed add-ons that Dungeon Train supports (NOT bundled).
# distanthorizons: use the 2.x line — 3.0.x crashes on world entry (see wiki Compatibility).
# Range is permissive so installing any version never blocks load; the recommendation lives in docs.
[[dependencies.${mod_id}]]
    modId="distanthorizons"
    type="optional"
    versionRange="[2.0,)"
    ordering="AFTER"
    side="BOTH"

# tectonic (terrain mod; pulls lithostitched). Generates only when the in-game
# "Compatible Terrain" option is on (Dungeon Train then uses vanilla overworld noise).
[[dependencies.${mod_id}]]
    modId="tectonic"
    type="optional"
    versionRange="[1.0,)"
    ordering="AFTER"
    side="BOTH"

[[mixins]]
    config="${mod_id}.mixins.json"
