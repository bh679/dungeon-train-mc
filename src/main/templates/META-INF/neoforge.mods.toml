modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/bh679/dungeon-train-mc/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''
displayURL="https://github.com/bh679/dungeon-train-mc"
# NeoForge in-game update check: fetches this JSON and flags the mod on the Mods screen when a
# newer version exists. Notification only, no download. Regenerated by release.yml each release.
updateJSONURL="${update_json_url}"
credits="Original game by Brennan Hatton (brennanhatton.itch.io/dungeontrain)."
logoFile="logo.png"

# Sable is pinned to EXACTLY the tested version (rendered from sable_mod_version in
# gradle.properties). Sable rewrites collision/physics, so DT is compiled against one
# specific build — the loader must reject any other Sable rather than run untested.
[[dependencies.${mod_id}]]
    modId="sable"
    type="required"
    versionRange="[${sable_mod_version}]"
    ordering="AFTER"
    side="BOTH"

# Sibling mods (same author). These are NOT bundled — each is a separate required
# download, so its own Modrinth/CurseForge page gets credited for the install.
#
# The range renders from <mod>_min_version, NOT <mod>_version. Those are different
# values on purpose: _version is what DT compiles against and the auto-release cascade
# bumps it every tick, whereas _min_version is the floor end users must clear and moves
# only when a human raises it. See the block comment in gradle.properties.
#
# Minimums, not Sable-style exact pins — these mods are additive to DT's compat surface.
[[dependencies.${mod_id}]]
    modId="adventureitemnames"
    type="required"
    versionRange="[${adventureitemnames_min_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="adventureitemstats"
    type="required"
    versionRange="[${adventureitemstats_min_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="playermob"
    type="required"
    versionRange="[${playermob_min_version},)"
    ordering="AFTER"
    side="BOTH"

# Discord Presence is still jarJar'd INSIDE this jar, so the shipped version is always
# exactly discordpresence_version — no floor indirection needed.
[[dependencies.${mod_id}]]
    modId="discordpresence"
    type="required"
    versionRange="[${discordpresence_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="enderchestpersistence"
    type="required"
    versionRange="[${enderchestpersistence_min_version},)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Optional, player-installed add-ons that Dungeon Train supports (NOT bundled).
# distanthorizons: use the 2.x line — 3.0.x crashes on world entry (see wiki Compatibility).
# Range is permissive so installing any version never blocks load; the recommendation lives in docs.
[[dependencies.${mod_id}]]
    modId="distanthorizons"
    type="optional"
    versionRange="[2.0,)"
    ordering="AFTER"
    side="BOTH"

# tectonic (terrain mod; pulls lithostitched). Generates only when the in-game
# "Compatible Terrain" option is on (Dungeon Train then uses vanilla overworld noise).
[[dependencies.${mod_id}]]
    modId="tectonic"
    type="optional"
    versionRange="[1.0,)"
    ordering="AFTER"
    side="BOTH"

# vivecraft (VR). Optional, player-installed — NOT bundled, NOT a compile dep. Dungeon Train
# ships a CLIENT-side compat mixin (dungeontrain.vivecraft.mixins.json, gated by VivecraftMixinPlugin)
# so VR melee works while standing on a Sable sub-level (train carriage). Metadata only; the mixin
# no-ops cleanly when Vivecraft is absent. Client-only, so side="CLIENT".
[[dependencies.${mod_id}]]
    modId="vivecraft"
    type="optional"
    versionRange="[1.0,)"
    ordering="AFTER"
    side="CLIENT"

[[mixins]]
    config="${mod_id}.mixins.json"

[[mixins]]
    config="${mod_id}.vivecraft.mixins.json"
