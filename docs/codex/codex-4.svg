<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Where is it going? (continued)</title>
<desc>An open book on a dark surface, ink verse on parchment pages.</desc>
<rect x="30" y="40" width="620" height="300" rx="10" fill="#241a36"/>
<rect x="44" y="52" width="292" height="276" rx="3" fill="#efe6cf"/><rect x="344" y="52" width="292" height="276" rx="3" fill="#efe6cf"/><rect x="336" y="52" width="8" height="276" fill="#1c1530"/><rect x="318" y="52" width="18" height="276" fill="#000000" opacity="0.08"/><rect x="344" y="52" width="18" height="276" fill="#000000" opacity="0.08"/>
<text x="66" y="97" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some practice ancient rituals</text>
<text x="66" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">in attempt to reach him.</text>
<text x="66" y="127" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">They speak of "<tspan fill="#2b50c8" text-decoration="underline">discord linking.</tspan>"</text>
<text x="66" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">A summoning, of sorts.</text>
<text x="66" y="157" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">A gathering place</text>
<text x="66" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">beyond the train,</text>
<text x="66" y="187" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">where the living and the Creator</text>
<text x="66" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">trade words.</text>
<text x="66" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">They say he answers there.</text>
<text x="66" y="247" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">That he takes every offering —</text>
<text x="66" y="262" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">every idea, every grievance, every prayer —</text>
<text x="66" y="277" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">and folds it back into the train.</text>
<text x="66" y="307" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">If you have a word to give,</text>
<text x="366" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">speak it.</text>
<text x="366" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Me?</text>
<text x="366" y="127" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">I stopped believing in the destination.</text>
<text x="366" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Only the journey remains.</text>
<text x="366" y="157" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Perhaps that was the point.</text>
<text x="60" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#8a7a52">ii</text>
<text x="620" y="316" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#8a7a52">iii</text>
</svg>