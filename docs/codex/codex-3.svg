<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The rider's codex — Who else rides the train?</title>
<desc>An open book on a dark surface. The left page is a chapter heading; the right page holds a verse answer.</desc>
<text x="340" y="40" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-style="italic" fill="#9a8fc4">~ the rider's codex ~</text>
<rect x="30" y="60" width="620" height="300" rx="10" fill="#241a36"/>
<rect x="44" y="72" width="292" height="276" rx="3" fill="#efe6cf"/>
<rect x="344" y="72" width="292" height="276" rx="3" fill="#efe6cf"/>
<rect x="336" y="72" width="8" height="276" fill="#1c1530"/>
<rect x="318" y="72" width="18" height="276" fill="#000000" opacity="0.08"/>
<rect x="344" y="72" width="18" height="276" fill="#000000" opacity="0.08"/>
<text x="190" y="196" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="500" fill="#3b3020">Who else rides</text>
<text x="190" y="224" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="500" fill="#3b3020">the train?</text>
<line x1="120" y1="252" x2="178" y2="252" stroke="#b8a87e" stroke-width="1"/>
<rect x="186" y="248" width="8" height="8" fill="#b8a87e" transform="rotate(45 190 252)"/>
<line x1="202" y1="252" x2="260" y2="252" stroke="#b8a87e" stroke-width="1"/>
<text x="354" y="102" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Others.</text>
<text x="354" y="117" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Or things shaped like them.</text>
<text x="354" y="132" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">They wear the faces of people —</text>
<text x="354" y="147" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">not quite.</text>
<text x="354" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some are kind.</text>
<text x="354" y="177" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some would see you gone.</text>
<text x="354" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some never know you were there at all.</text>
<text x="354" y="207" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">You will not meet the same one twice.</text>
<text x="354" y="237" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">The old riders call speak of echoes.</text>
<text x="354" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Echoes of those who passed before.</text>
<text x="354" y="267" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Echoes of strangers long gone.</text>
<text x="354" y="282" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">And sometimes —</text>
<text x="354" y="297" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">an echo of yourself.</text>
<text x="354" y="312" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">I try not to look too closely myself.</text>

<text x="620" y="336" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#8a7a52">i</text>
</svg>