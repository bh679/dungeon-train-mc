<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Where is it going?</title>
<desc>An open book on a dark surface, ink verse on parchment pages.</desc>
<rect x="30" y="40" width="620" height="300" rx="10" fill="#241a36"/>
<rect x="44" y="52" width="292" height="276" rx="3" fill="#efe6cf"/><rect x="344" y="52" width="292" height="276" rx="3" fill="#efe6cf"/><rect x="336" y="52" width="8" height="276" fill="#1c1530"/><rect x="318" y="52" width="18" height="276" fill="#000000" opacity="0.08"/><rect x="344" y="52" width="18" height="276" fill="#000000" opacity="0.08"/>
<text x="190" y="174" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="500" fill="#3b3020">Where is it</text>
<text x="190" y="202" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="500" fill="#3b3020">going?</text>
<line x1="120" y1="232" x2="178" y2="232" stroke="#b8a87e" stroke-width="1"/><rect x="186" y="228" width="8" height="8" fill="#b8a87e" transform="rotate(45 190 232)"/><line x1="202" y1="232" x2="260" y2="232" stroke="#b8a87e" stroke-width="1"/>
<text x="366" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Depends who you ask.</text>
<text x="366" y="97" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some speak of loved ones.</text>
<text x="366" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Other treasure.</text>
<text x="366" y="127" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Many simply green fields. Lush forests.</text>
<text x="366" y="142" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Endless desert. The dark depths.</text>
<text x="366" y="157" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Fewer speak of fire. Of voids without end.</text>
<text x="366" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">A Kingdom of Candy.</text>
<text x="366" y="187" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Beyond the worlds boarder.</text>
<text x="366" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Escape.</text>
<text x="366" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Fewer still speak of the Creator —</text>
<text x="366" y="247" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">The request he makes,</text>
<text x="366" y="262" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">asked only in death.</text>
<text x="366" y="277" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">They say his passion will not let him rest.</text>
<text x="366" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">That he listens to anyone</text>
<text x="366" y="307" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">with a word to offer.</text>
<text x="620" y="316" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#8a7a52">i</text>
</svg>