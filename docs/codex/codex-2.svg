<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>The rider's codex — What does it want from me?</title>
<desc>An open book on a dark surface. The left page is a chapter heading; the right page holds a verse answer.</desc>
<text x="340" y="40" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-style="italic" fill="#9a8fc4">~ the rider's codex ~</text>
<rect x="30" y="60" width="620" height="300" rx="10" fill="#241a36"/>
<rect x="44" y="72" width="292" height="276" rx="3" fill="#efe6cf"/>
<rect x="344" y="72" width="292" height="276" rx="3" fill="#efe6cf"/>
<rect x="336" y="72" width="8" height="276" fill="#1c1530"/>
<rect x="318" y="72" width="18" height="276" fill="#000000" opacity="0.08"/>
<rect x="344" y="72" width="18" height="276" fill="#000000" opacity="0.08"/>
<text x="190" y="196" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="500" fill="#3b3020">What does it</text>
<text x="190" y="224" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="500" fill="#3b3020">want from me?</text>
<line x1="120" y1="252" x2="178" y2="252" stroke="#b8a87e" stroke-width="1"/>
<rect x="186" y="248" width="8" height="8" fill="#b8a87e" transform="rotate(45 190 252)"/>
<line x1="202" y1="252" x2="260" y2="252" stroke="#b8a87e" stroke-width="1"/>
<text x="354" y="102" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">It wants, I think.</text>
<text x="354" y="117" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some say its loot —</text>
<text x="354" y="132" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">infinite, and never the same twice.</text>
<text x="354" y="147" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Others say a lesson.</text>
<text x="354" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">A moral, drip-fed</text>
<text x="354" y="177" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">between the characters,</text>
<text x="354" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">the lore,</text>
<text x="354" y="207" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">the ever-harder enemies.</text>
<text x="354" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Me?</text>
<text x="354" y="237" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">I think it only wants</text>
<text x="354" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">the right questions.</text>

<text x="620" y="336" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-style="italic" fill="#8a7a52">i</text>
</svg>