<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>What does it want from me? / Who else rides the train?</title>
<desc>An open book on a dark surface, ink verse on parchment pages.</desc>
<rect x="30" y="40" width="620" height="300" rx="10" fill="#241a36"/>
<rect x="44" y="52" width="292" height="276" rx="3" fill="#efe6cf"/><rect x="344" y="52" width="292" height="276" rx="3" fill="#efe6cf"/><rect x="336" y="52" width="8" height="276" fill="#1c1530"/><rect x="318" y="52" width="18" height="276" fill="#000000" opacity="0.08"/><rect x="344" y="52" width="18" height="276" fill="#000000" opacity="0.08"/>
<text x="190" y="76" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#3b3020">What does it want from me?</text><line x1="128" y1="86" x2="252" y2="86" stroke="#c9bb96" stroke-width="1"/>
<text x="490" y="76" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="500" fill="#3b3020">Who else rides the train?</text><line x1="428" y1="86" x2="552" y2="86" stroke="#c9bb96" stroke-width="1"/>
<text x="66" y="106" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">It wants, I think.</text>
<text x="66" y="121" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some say its loot —</text>
<text x="66" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">infinite, and never the same twice.</text>
<text x="66" y="151" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Others say a lesson.</text>
<text x="66" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">A moral, drip-fed</text>
<text x="66" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">between the characters,</text>
<text x="66" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">the lore,</text>
<text x="66" y="211" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">the ever-harder enemies.</text>
<text x="66" y="226" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Me?</text>
<text x="66" y="241" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">I think it only wants</text>
<text x="66" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">the right questions.</text>
<text x="366" y="106" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Others.</text>
<text x="366" y="121" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Or things shaped like them.</text>
<text x="366" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">They wear the faces of people —</text>
<text x="366" y="151" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">not quite.</text>
<text x="366" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some are kind.</text>
<text x="366" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some would see you gone.</text>
<text x="366" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Some never know you were there at all.</text>
<text x="366" y="211" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">You will not meet the same one twice.</text>
<text x="366" y="241" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">The old riders call speak of echoes.</text>
<text x="366" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Echoes of those who passed before.</text>
<text x="366" y="271" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">Echoes of strangers long gone.</text>
<text x="366" y="286" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">And sometimes —</text>
<text x="366" y="301" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">an echo of yourself.</text>
<text x="366" y="316" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4a3d28">I try not to look too closely myself.</text>
</svg>