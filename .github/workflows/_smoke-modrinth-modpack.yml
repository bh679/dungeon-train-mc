name: _smoke Modrinth modpack (TEMP — delete before merge)

# TEMPORARY pre-merge smoke test. A brand-new workflow_dispatch workflow cannot be
# dispatched by `gh workflow run` until it exists on the default branch, so this push-
# triggered job exercises the same steps as release-modpack-modrinth.yml (build-mrpack.py
# in the runner against the real Modrinth API + publish-modrinth.sh in DRY_RUN) to verify
# the runner plumbing before merge. Scoped to the feature branch. DELETE this file before
# the Gate 3 merge.

on:
  push:
    branches: [dev/modrinth-modpack-release]
    paths:
      - ".github/workflows/_smoke-modrinth-modpack.yml"
      - "scripts/modpack/**"
      - "modpack/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest DT Modrinth version id
        id: dt
        run: |
          DT_VER=$(python3 - <<'PY'
          import json, urllib.request
          url = ("https://api.modrinth.com/v2/project/dungeon-train/version"
                 "?loaders=%5B%22neoforge%22%5D&game_versions=%5B%221.21.1%22%5D")
          req = urllib.request.Request(url, headers={"User-Agent": "dt-smoke/1.0"})
          print(json.load(urllib.request.urlopen(req))[0]["id"])
          PY
          )
          echo "id=$DT_VER" >> "$GITHUB_OUTPUT"
          echo "Resolved DT Modrinth version id: $DT_VER"

      - name: Render Modrinth modpack index
        run: |
          python3 scripts/modpack/build-mrpack.py \
            --dt-version "${{ steps.dt.outputs.id }}" \
            --version v0.0.0-smoke \
            --output modrinth.index.json
          echo "::group::Rendered modrinth.index.json"
          cat modrinth.index.json
          echo "::endgroup::"

      - name: Build .mrpack (DRY_RUN — no upload)
        env:
          DRY_RUN: "1"
          MODRINTH_MODPACK_PROJECT_ID: bEFyz3ji
        run: bash scripts/modpack/publish-modrinth.sh --index modrinth.index.json --tag v0.0.0-smoke

      - name: Assert .mrpack is well-formed
        run: |
          python3 - <<'PY'
          import zipfile, json, glob, sys
          path = glob.glob("dungeon-train-*.mrpack")[0]
          z = zipfile.ZipFile(path)
          names = z.namelist()
          assert "modrinth.index.json" in names, names
          idx = json.loads(z.read("modrinth.index.json"))
          assert idx["formatVersion"] == 1 and idx["game"] == "minecraft", idx
          assert idx["dependencies"].get("neoforge"), idx["dependencies"]
          assert len(idx["files"]) == 21, f"expected 21 files, got {len(idx['files'])}"
          bad = [f for f in idx["files"] if not f["downloads"][0].startswith("https://cdn.modrinth.com")]
          assert not bad, bad
          miss = [f["path"] for f in idx["files"] if not (f["hashes"].get("sha1") and f["hashes"].get("sha512") and f.get("fileSize"))]
          assert not miss, miss
          print(f"OK: {path} has {len(idx['files'])} valid files, all on cdn.modrinth.com")
          PY
