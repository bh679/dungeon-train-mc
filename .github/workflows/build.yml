name: Build

on:
  push:
    # dev/fabric-port-phase0-spike: the Fabric-port program trunk builds all three
    # modules (root NeoForge + :common + :fabric) on every push while the program
    # runs without an open PR. Remove this entry at program merge (Stage 5).
    branches: [main, 'dev/fabric-port-phase0-spike']
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v3
        # Note: NOT setting gradle-home-cache-cleanup: true. Leaving the cache
        # cleanup off keeps CI from failing on a transient cache-save outage;
        # the cache grows slightly over time in exchange. (The wrapper is
        # Gradle 9.5.1 — see gradle/wrapper/gradle-wrapper.properties.)

      - run: ./gradlew build --no-daemon

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dungeontrain-jar-${{ github.sha }}
          path: build/libs/dungeontrain-*.jar
          if-no-files-found: error
          retention-days: 14

  # Stdlib-only Python guards for the CurseForge modpack config. No Java/Gradle —
  # python3 is preinstalled on ubuntu-latest — so this runs fast, in parallel with
  # `build`. check-relations.py enforces the invariant that every modpack Include
  # (optional_mods) is also declared as an <slug>(optional) dependency of the mod in
  # release.yml (the bug that shipped AppleSkin un-declared in PR #390).
  modpack-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Modpack Include ↔ mod dependency consistency
        run: python3 scripts/modpack/check-relations.py

      - name: Modpack Modrinth pins present on every mod
        # Fails CI if a mod is added to modpack.config.json without its Modrinth
        # project+version pin (which would silently drop it from the .mrpack). No network.
        run: python3 scripts/modpack/build-mrpack.py --check-config

      - name: Sable version pin chain (gradle <-> mods.toml lock <-> modpack)
        # Fails CI if sable_mod_version (DT's exact mods.toml lock) or the modpack's
        # sable.version drift from gradle.properties sable_version. No network.
        run: python3 scripts/modpack/check-sable-pin.py

      - name: Modpack manifest + relation tests
        run: |
          python3 scripts/modpack/test_build_manifest.py
          python3 scripts/modpack/test_check_relations.py
          python3 scripts/modpack/test_build_mrpack.py
          python3 scripts/modpack/test_check_sable_pin.py
