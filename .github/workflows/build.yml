name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v3
        # Note: NOT setting gradle-home-cache-cleanup: true. The action's
        # cleanup step uses Gradle 9.x APIs (removeUnusedEntriesOlderThan)
        # which crash against our Gradle 8.4 wrapper. Without this flag the
        # cleanup is skipped; the cache grows slightly over time but the
        # build never fails on a transient cache-save outage.

      - run: ./gradlew build --no-daemon

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dungeontrain-jar-${{ github.sha }}
          path: build/libs/dungeontrain-*.jar
          if-no-files-found: error
          retention-days: 14

  # Stdlib-only Python guards for the CurseForge + Modrinth modpack configs. No
  # Java/Gradle — python3 is preinstalled on ubuntu-latest — so this runs fast, in
  # parallel with `build`. check-relations.py enforces the invariant that every modpack
  # Include (optional_mods) is also declared as a dependency of the mod in release.yml
  # (the bug that shipped AppleSkin un-declared in PR #390); check-pins.py guards both
  # the exact Sable chain and the un-bundled sibling mods' minimum-version floors.
  modpack-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Modpack Include ↔ mod dependency consistency
        run: python3 scripts/modpack/check-relations.py

      - name: Modpack Modrinth pins present on every mod
        # Fails CI if a mod is added to modpack.config.json without its Modrinth
        # project+version pin (which would silently drop it from the .mrpack). No network.
        run: python3 scripts/modpack/build-mrpack.py --check-config

      - name: Dependency version pins (Sable chain + sibling floors)
        # Two checks. (1) Sable: fails if sable_mod_version (DT's exact mods.toml lock) or
        # the modpack's sable.version drift from gradle.properties sable_version.
        # (2) Siblings: fails if a modpack-pinned AIN/AIS/PMOB/ECP build is OLDER than the
        # <mod>_min_version floor DT declares — i.e. the pack would ship a sibling the mod
        # refuses to load against. No network.
        run: python3 scripts/modpack/check-pins.py

      - name: Modpack manifest + relation tests
        run: |
          python3 scripts/modpack/test_build_manifest.py
          python3 scripts/modpack/test_check_relations.py
          python3 scripts/modpack/test_build_mrpack.py
          python3 scripts/modpack/test_check_pins.py

  # Stdlib-only Python guard for the per-line translation provenance sidecars
  # (localization/provenance/<locale>.json — who translated / who human-reviewed each
  # line). Fails when a translation wave lands lang keys without provenance entries,
  # when entries drift out of key set/order lockstep with their lang file, or when an
  # entry is malformed. The failure message carries the fix command
  # (stamp-provenance.py --sync). Runs fast and in parallel with `build`, same as
  # modpack-checks.
  localization-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Per-line translation provenance aligned with lang files
        run: python3 scripts/localization/check-provenance.py

      - name: Provenance script tests
        run: |
          python3 scripts/localization/test_check_provenance.py
          python3 scripts/localization/test_stamp_provenance.py
