name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        # Note: NOT setting gradle-home-cache-cleanup: true. The action's
        # cleanup step uses Gradle 9.x APIs (removeUnusedEntriesOlderThan)
        # which crash against our Gradle 8.4 wrapper. Without this flag the
        # cleanup is skipped; the cache grows slightly over time but the
        # build never fails on a transient cache-save outage.

      - name: Cache Forge Gradle artifacts
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/forge_gradle
          key: forge-gradle-${{ runner.os }}-${{ hashFiles('build.gradle', 'gradle.properties') }}
          restore-keys: |
            forge-gradle-${{ runner.os }}-

      - run: ./gradlew build --no-daemon

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dungeontrain-jar-${{ github.sha }}
          path: build/libs/dungeontrain-*.jar
          if-no-files-found: error
          retention-days: 14
