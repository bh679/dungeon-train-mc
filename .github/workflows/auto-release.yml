name: Auto-Release Cascade

# Hourly tapering cascade of micro-releases anchored on the last real release.
# Each fire prefers (in order): one-step AIN dependency bump, then a queue
# item, then a mode-dependent fallback (auto-balance loot nudge in 'always'
# mode, or stop the cascade in 'with-content' / 'ain' modes).
#
# See .github/auto-release/README.md for the cadence and mode semantics.

on:
  schedule:
    # Six redundant fires per hour at 10-min intervals. GitHub Actions
    # schedule events are best-effort and frequently drop or delay
    # individual ticks — observed in May 2026 with 3+ consecutive drops
    # in a single hour. Spreading the trigger across :02/:12/:22/:32/:42/:52
    # means an entire hour is only missed if all six are dropped, which is
    # rare. should-fire.py + the concurrency block below ensure duplicates
    # within the threshold window self-skip (extra fires become idempotent
    # rejects against the phase's 90%-of-interval threshold).
    - cron: "2 * * * *"
    - cron: "12 * * * *"
    - cron: "22 * * * *"
    - cron: "32 * * * *"
    - cron: "42 * * * *"
    - cron: "52 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Apply the change locally but don't commit/push/dispatch."
        required: false
        type: boolean
        default: false
      force:
        description: "Skip should-fire check (still respects 14d window via apply step needing valid state)."
        required: false
        type: boolean
        default: false

concurrency:
  group: auto-release-cascade
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  cascade:
    # Kill switch: set repo variable AUTO_RELEASE_ENABLED=false to disable the
    # entire cascade (scheduled ticks AND workflow_dispatch with force=true).
    # The variable also encodes mode — see README. 'false' is the only value
    # that disables the job entirely; everything else runs and the mode is
    # parsed inside apply-change.py (default 'always' on unset/unknown).
    if: vars.AUTO_RELEASE_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v3

      - name: Decide whether to fire
        id: decide
        env:
          STATE_FILE: .github/auto-release/state.json
          AUTO_RELEASE_MODE: ${{ vars.AUTO_RELEASE_ENABLED }}
          AUTO_RELEASE_CADENCE: ${{ vars.AUTO_RELEASE_CADENCE }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/auto-release/should-fire.py

      - name: Exit early if not firing
        if: steps.decide.outputs.fire != 'true' && inputs.force != true
        run: |
          echo "Skip cascade tick: ${{ steps.decide.outputs.reason }}"

      - name: Apply change
        if: steps.decide.outputs.fire == 'true' || inputs.force == true
        id: apply
        env:
          AUTO_RELEASE_MODE: ${{ vars.AUTO_RELEASE_ENABLED }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/auto-release/apply-change.py

      - name: Verify AIN bump builds
        if: steps.apply.outputs.change_kind == 'ain_bump'
        id: ain_build
        continue-on-error: true
        run: ./gradlew build

      - name: Fallback after AIN build failure
        if: steps.apply.outputs.change_kind == 'ain_bump' && steps.ain_build.outcome == 'failure'
        id: apply_fallback_ain
        env:
          AUTO_RELEASE_MODE: ${{ vars.AUTO_RELEASE_ENABLED }}
          SKIP_AIN: "1"
          AIN_FROM: ${{ steps.apply.outputs.ain_from }}
          AIN_TO: ${{ steps.apply.outputs.ain_to }}
        run: |
          set -euo pipefail
          echo "::warning::AIN bump $AIN_FROM -> $AIN_TO failed gradle build — reverting and falling through."
          git checkout -- gradle.properties .github/auto-release/state.json
          python3 scripts/auto-release/apply-change.py

      - name: Verify AIS bump builds
        if: steps.apply.outputs.change_kind == 'ais_bump'
        id: ais_build
        continue-on-error: true
        run: ./gradlew build

      - name: Fallback after AIS build failure
        if: steps.apply.outputs.change_kind == 'ais_bump' && steps.ais_build.outcome == 'failure'
        id: apply_fallback_ais
        env:
          AUTO_RELEASE_MODE: ${{ vars.AUTO_RELEASE_ENABLED }}
          SKIP_AIS: "1"
          AIS_FROM: ${{ steps.apply.outputs.ais_from }}
          AIS_TO: ${{ steps.apply.outputs.ais_to }}
        run: |
          set -euo pipefail
          echo "::warning::AIS bump $AIS_FROM -> $AIS_TO failed gradle build — reverting and falling through."
          git checkout -- gradle.properties .github/auto-release/state.json
          python3 scripts/auto-release/apply-change.py

      - name: Compose final outputs
        if: steps.decide.outputs.fire == 'true' || inputs.force == true
        id: final
        env:
          PRIMARY_KIND: ${{ steps.apply.outputs.change_kind }}
          PRIMARY_MSG: ${{ steps.apply.outputs.commit_message }}
          PRIMARY_ID: ${{ steps.apply.outputs.applied_id }}
          AIN_BUILD_OUTCOME: ${{ steps.ain_build.outcome }}
          AIS_BUILD_OUTCOME: ${{ steps.ais_build.outcome }}
          AIN_FALLBACK_KIND: ${{ steps.apply_fallback_ain.outputs.change_kind }}
          AIN_FALLBACK_MSG: ${{ steps.apply_fallback_ain.outputs.commit_message }}
          AIN_FALLBACK_ID: ${{ steps.apply_fallback_ain.outputs.applied_id }}
          AIS_FALLBACK_KIND: ${{ steps.apply_fallback_ais.outputs.change_kind }}
          AIS_FALLBACK_MSG: ${{ steps.apply_fallback_ais.outputs.commit_message }}
          AIS_FALLBACK_ID: ${{ steps.apply_fallback_ais.outputs.applied_id }}
        run: |
          set -euo pipefail
          if [ "$PRIMARY_KIND" = "ain_bump" ] && [ "$AIN_BUILD_OUTCOME" = "failure" ]; then
            KIND="$AIN_FALLBACK_KIND"
            MSG="$AIN_FALLBACK_MSG"
            ID="$AIN_FALLBACK_ID"
          elif [ "$PRIMARY_KIND" = "ais_bump" ] && [ "$AIS_BUILD_OUTCOME" = "failure" ]; then
            KIND="$AIS_FALLBACK_KIND"
            MSG="$AIS_FALLBACK_MSG"
            ID="$AIS_FALLBACK_ID"
          else
            KIND="$PRIMARY_KIND"
            MSG="$PRIMARY_MSG"
            ID="$PRIMARY_ID"
          fi
          {
            echo "change_kind=$KIND"
            echo "commit_message=$MSG"
            echo "applied_id=$ID"
          } >> "$GITHUB_OUTPUT"
          echo "Final: change_kind=$KIND applied_id=$ID"

      - name: Finalize and push (with race retry)
        # Unified step: PATCH bump (release ticks) or no bump (stopped ticks),
        # then commit + push with retry-on-race. If main moves between our
        # checkout and our push (e.g. Gate 3 merge lands mid-tick), we reset
        # to fresh main, re-run apply-change.py against the new state, and
        # retry. Up to 3 attempts; on exhaustion we exit cleanly so the next
        # scheduled tick (every 20 min) picks up fresh state.
        #
        # Build verification is NOT re-run on retry — apply-change is
        # deterministic against main's queue.json / gradle.properties, so the
        # retry's bump (if any) is usually identical to the original. The
        # rare edge case (a new AIN/AIS release dropping mid-tick) is logged.
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true)
        id: commit_push
        env:
          INITIAL_CHANGE_KIND: ${{ steps.final.outputs.change_kind }}
          INITIAL_COMMIT_MSG: ${{ steps.final.outputs.commit_message }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -uo pipefail

          CHANGE_KIND="$INITIAL_CHANGE_KIND"
          COMMIT_MSG="$INITIAL_COMMIT_MSG"
          NEW_VERSION=""

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          bump_patch() {
            local current
            current=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
            if ! echo "$current" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::mod_version=$current is not strict X.Y.Z — refusing to auto-bump" >&2
              return 1
            fi
            local major minor patch new
            major=$(echo "$current" | cut -d. -f1)
            minor=$(echo "$current" | cut -d. -f2)
            patch=$(echo "$current" | cut -d. -f3)
            new="$major.$minor.$((patch + 1))"
            sed -i "s/^mod_version=.*/mod_version=$new/" gradle.properties
            echo "Bumped mod_version: $current -> $new" >&2
            echo "$new"
          }

          # finalize_commit return codes:
          #   0 — commit built and staged
          #   1 — hard failure (bad gradle.properties, no diff, etc.)
          #   2 — nothing to do (stopped state already current)
          finalize_commit() {
            if [ "$CHANGE_KIND" = "stopped" ]; then
              # Stopped ticks only touch state.json. No PATCH bump.
              git add .github/auto-release/state.json
              if git diff --cached --quiet; then
                return 2
              fi
              git commit -m "$COMMIT_MSG [skip ci]"
              return 0
            fi
            # Release ticks: bump PATCH then commit everything.
            NEW_VERSION=$(bump_patch) || return 1
            # Apply-change writes to known dirs: .github/auto-release/,
            # gradle.properties (AIN/AIS bump), the loot table, and (for
            # new_file items) somewhere under src/main/resources/data/dungeontrain/.
            # PATCH bump above also touches gradle.properties. -A covers all.
            git add -A
            if git diff --cached --quiet; then
              echo "::error::no changes staged — apply-change.py produced no diff" >&2
              return 1
            fi
            git commit -m "$COMMIT_MSG (auto v$NEW_VERSION) [skip ci]"
            return 0
          }

          emit_outputs() {
            local push_status="$1"
            {
              echo "final_change_kind=$CHANGE_KIND"
              echo "commit_message=$COMMIT_MSG"
              echo "push_succeeded=$push_status"
              if [ "$CHANGE_KIND" != "stopped" ] && [ -n "$NEW_VERSION" ]; then
                echo "version=$NEW_VERSION"
                echo "tag=v$NEW_VERSION"
              fi
            } >> "$GITHUB_OUTPUT"
          }

          # Initial finalize attempt
          rc=0
          finalize_commit || rc=$?
          case $rc in
            0) ;;
            2)
              echo "::notice::Stopped state already current — state.json unchanged"
              emit_outputs "skipped"
              exit 0
              ;;
            *) exit 1 ;;
          esac

          # Dry-run: emit outputs, undo the local commit so the dry-run
          # summary's `git diff --stat` can see the modifications. Use
          # --mixed (default) so changes become unstaged.
          if [ "$DRY_RUN" = "true" ]; then
            emit_outputs "dry_run"
            git reset HEAD~1
            echo "::notice::dry_run=true; commit built locally but not pushed"
            exit 0
          fi

          # Push with retry loop. Up to 3 attempts.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "::notice::Push succeeded on attempt $attempt"
              # Verify the push actually landed on the remote.
              local_head=$(git rev-parse HEAD)
              remote_head=$(git ls-remote origin refs/heads/main | awk '{print $1}')
              if [ "$local_head" != "$remote_head" ]; then
                echo "::error::push verification failed (local=$local_head remote=$remote_head)" >&2
                exit 1
              fi
              echo "Push verified: $local_head"
              if [ "$CHANGE_KIND" = "stopped" ]; then
                echo "::notice::Cascade stopped — no release dispatched. Next real release will resume the cascade."
              fi
              emit_outputs "true"
              exit 0
            fi

            if [ "$attempt" = "3" ]; then break; fi

            echo "::warning::Push attempt $attempt rejected — recovering from race on main"
            sleep $((attempt * 5))

            git fetch origin main
            git reset --hard origin/main

            # Re-run apply-change.py against fresh main. Use a tempfile for
            # GITHUB_OUTPUT so the rerun doesn't pollute step.apply.outputs
            # (those reflect the original tick).
            TMP_OUT=$(mktemp)
            if ! GITHUB_OUTPUT="$TMP_OUT" python3 scripts/auto-release/apply-change.py; then
              echo "::warning::apply-change.py failed on retry $attempt — aborting recovery" >&2
              rm -f "$TMP_OUT"
              break
            fi
            NEW_KIND=$(grep '^change_kind=' "$TMP_OUT" | tail -1 | cut -d= -f2-)
            NEW_MSG=$(grep '^commit_message=' "$TMP_OUT" | tail -1 | cut -d= -f2-)
            rm -f "$TMP_OUT"

            if [ -z "$NEW_KIND" ]; then
              echo "::warning::apply-change.py produced no change_kind on retry — aborting recovery" >&2
              break
            fi

            if [ "$NEW_KIND" != "$CHANGE_KIND" ]; then
              echo "::warning::Retry produced different change kind ($CHANGE_KIND -> $NEW_KIND)"
            fi
            if { [ "$NEW_KIND" = "ain_bump" ] || [ "$NEW_KIND" = "ais_bump" ]; } && [ "$NEW_KIND" != "$CHANGE_KIND" ]; then
              echo "::warning::Retry produced $NEW_KIND but original tick was $CHANGE_KIND — build NOT re-verified for the new bump"
            fi

            CHANGE_KIND="$NEW_KIND"
            COMMIT_MSG="$NEW_MSG"
            NEW_VERSION=""

            rc=0
            finalize_commit || rc=$?
            case $rc in
              0) ;;
              2)
                echo "::notice::Retry produced stopped state already current — nothing to push"
                emit_outputs "skipped"
                exit 0
                ;;
              *) exit 1 ;;
            esac
          done

          echo "::warning::Push failed after 3 attempts; next scheduled tick will retry from fresh state"
          emit_outputs "false"
          exit 0

      - name: Dispatch Release workflow
        # notify_discord=false: cascade ticks silence the Discord webhook so the
        # release channel doesn't get spammed by ~22 micro-releases per cascade.
        # Modrinth + CurseForge uploads still fire (that's the point of the cascade —
        # to keep the mod fresh on "recently updated" feeds).
        #
        # Gated on push_succeeded=true so a race-exhausted tick doesn't dispatch
        # a release for a tag that never landed on main. final_change_kind reflects
        # the kind that was actually committed (may differ from steps.final.outputs
        # if a retry produced a different change after main moved).
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && steps.commit_push.outputs.final_change_kind != 'stopped' && steps.commit_push.outputs.push_succeeded == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.commit_push.outputs.tag }}
        run: |
          gh workflow run release.yml -f tag="$TAG" -f auto=true -f notify_discord=false
          echo "Dispatched release.yml with tag=$TAG auto=true notify_discord=false"

      - name: Dry-run summary
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && inputs.dry_run == true
        env:
          COMMIT_MSG: ${{ steps.commit_push.outputs.commit_message }}
          NEW_VERSION: ${{ steps.commit_push.outputs.version }}
          KIND: ${{ steps.commit_push.outputs.final_change_kind }}
          APPLIED_ID: ${{ steps.final.outputs.applied_id }}
          AIN_FROM: ${{ steps.apply.outputs.ain_from }}
          AIN_TO: ${{ steps.apply.outputs.ain_to }}
          BUILD_OUTCOME: ${{ steps.ain_build.outcome }}
        run: |
          echo "DRY RUN — change_kind=$KIND  applied_id=$APPLIED_ID"
          if [ -n "$AIN_FROM" ]; then
            echo "DRY RUN — AIN bump attempted: $AIN_FROM -> $AIN_TO (build outcome: ${BUILD_OUTCOME:-skipped})"
          fi
          if [ "$KIND" = "stopped" ]; then
            echo "DRY RUN — would commit stopped state: $COMMIT_MSG [skip ci]"
            echo "DRY RUN — would NOT dispatch release.yml"
          else
            echo "DRY RUN — would commit: $COMMIT_MSG (auto v$NEW_VERSION) [skip ci]"
            echo "DRY RUN — would dispatch release.yml tag=v$NEW_VERSION auto=true notify_discord=false"
          fi
          echo "DRY RUN — diff preview:"
          git --no-pager diff --stat

  disabled-notice:
    # Leaves a visible breadcrumb in the Actions UI when the cascade is killed
    # via the AUTO_RELEASE_ENABLED repo variable. Skipped jobs alone are easy
    # to miss; this job surfaces a notice annotation on every tick the kill
    # switch is active.
    if: vars.AUTO_RELEASE_ENABLED == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Cascade is disabled
        run: |
          echo "::notice::Auto-release cascade is DISABLED via repo variable AUTO_RELEASE_ENABLED=false."
          echo "::notice::Set the variable to 'always', 'with-content', or 'ain' (or unset) to re-enable."
