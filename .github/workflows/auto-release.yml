name: Auto-Release Cascade

# Hourly tapering cascade of micro-releases anchored on the last real release.
# Each fire prefers (in order): one-step AIN dependency bump, then a queue
# item, then a mode-dependent fallback (auto-balance loot nudge in 'always'
# mode, or stop the cascade in 'with-content' / 'ain' modes).
#
# See .github/auto-release/README.md for the cadence and mode semantics.

on:
  schedule:
    - cron: "47 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Apply the change locally but don't commit/push/dispatch."
        required: false
        type: boolean
        default: false
      force:
        description: "Skip should-fire check (still respects 14d window via apply step needing valid state)."
        required: false
        type: boolean
        default: false

concurrency:
  group: auto-release-cascade
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  cascade:
    # Kill switch: set repo variable AUTO_RELEASE_ENABLED=false to disable the
    # entire cascade (scheduled ticks AND workflow_dispatch with force=true).
    # The variable also encodes mode — see README. 'false' is the only value
    # that disables the job entirely; everything else runs and the mode is
    # parsed inside apply-change.py (default 'always' on unset/unknown).
    if: vars.AUTO_RELEASE_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v3

      - name: Decide whether to fire
        id: decide
        env:
          STATE_FILE: .github/auto-release/state.json
        run: python3 scripts/auto-release/should-fire.py

      - name: Exit early if not firing
        if: steps.decide.outputs.fire != 'true' && inputs.force != true
        run: |
          echo "Skip cascade tick: ${{ steps.decide.outputs.reason }}"

      - name: Apply change
        if: steps.decide.outputs.fire == 'true' || inputs.force == true
        id: apply
        env:
          AUTO_RELEASE_MODE: ${{ vars.AUTO_RELEASE_ENABLED }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/auto-release/apply-change.py

      - name: Verify AIN bump builds
        if: steps.apply.outputs.change_kind == 'ain_bump'
        id: ain_build
        continue-on-error: true
        run: ./gradlew build

      - name: Fallback after AIN build failure
        if: steps.apply.outputs.change_kind == 'ain_bump' && steps.ain_build.outcome == 'failure'
        id: apply_fallback_ain
        env:
          AUTO_RELEASE_MODE: ${{ vars.AUTO_RELEASE_ENABLED }}
          SKIP_AIN: "1"
          AIN_FROM: ${{ steps.apply.outputs.ain_from }}
          AIN_TO: ${{ steps.apply.outputs.ain_to }}
        run: |
          set -euo pipefail
          echo "::warning::AIN bump $AIN_FROM -> $AIN_TO failed gradle build — reverting and falling through."
          git checkout -- gradle.properties .github/auto-release/state.json
          python3 scripts/auto-release/apply-change.py

      - name: Verify AIS bump builds
        if: steps.apply.outputs.change_kind == 'ais_bump'
        id: ais_build
        continue-on-error: true
        run: ./gradlew build

      - name: Fallback after AIS build failure
        if: steps.apply.outputs.change_kind == 'ais_bump' && steps.ais_build.outcome == 'failure'
        id: apply_fallback_ais
        env:
          AUTO_RELEASE_MODE: ${{ vars.AUTO_RELEASE_ENABLED }}
          SKIP_AIS: "1"
          AIS_FROM: ${{ steps.apply.outputs.ais_from }}
          AIS_TO: ${{ steps.apply.outputs.ais_to }}
        run: |
          set -euo pipefail
          echo "::warning::AIS bump $AIS_FROM -> $AIS_TO failed gradle build — reverting and falling through."
          git checkout -- gradle.properties .github/auto-release/state.json
          python3 scripts/auto-release/apply-change.py

      - name: Compose final outputs
        if: steps.decide.outputs.fire == 'true' || inputs.force == true
        id: final
        env:
          PRIMARY_KIND: ${{ steps.apply.outputs.change_kind }}
          PRIMARY_MSG: ${{ steps.apply.outputs.commit_message }}
          PRIMARY_ID: ${{ steps.apply.outputs.applied_id }}
          AIN_BUILD_OUTCOME: ${{ steps.ain_build.outcome }}
          AIS_BUILD_OUTCOME: ${{ steps.ais_build.outcome }}
          AIN_FALLBACK_KIND: ${{ steps.apply_fallback_ain.outputs.change_kind }}
          AIN_FALLBACK_MSG: ${{ steps.apply_fallback_ain.outputs.commit_message }}
          AIN_FALLBACK_ID: ${{ steps.apply_fallback_ain.outputs.applied_id }}
          AIS_FALLBACK_KIND: ${{ steps.apply_fallback_ais.outputs.change_kind }}
          AIS_FALLBACK_MSG: ${{ steps.apply_fallback_ais.outputs.commit_message }}
          AIS_FALLBACK_ID: ${{ steps.apply_fallback_ais.outputs.applied_id }}
        run: |
          set -euo pipefail
          if [ "$PRIMARY_KIND" = "ain_bump" ] && [ "$AIN_BUILD_OUTCOME" = "failure" ]; then
            KIND="$AIN_FALLBACK_KIND"
            MSG="$AIN_FALLBACK_MSG"
            ID="$AIN_FALLBACK_ID"
          elif [ "$PRIMARY_KIND" = "ais_bump" ] && [ "$AIS_BUILD_OUTCOME" = "failure" ]; then
            KIND="$AIS_FALLBACK_KIND"
            MSG="$AIS_FALLBACK_MSG"
            ID="$AIS_FALLBACK_ID"
          else
            KIND="$PRIMARY_KIND"
            MSG="$PRIMARY_MSG"
            ID="$PRIMARY_ID"
          fi
          {
            echo "change_kind=$KIND"
            echo "commit_message=$MSG"
            echo "applied_id=$ID"
          } >> "$GITHUB_OUTPUT"
          echo "Final: change_kind=$KIND applied_id=$ID"

      - name: Bump PATCH in gradle.properties
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && steps.final.outputs.change_kind != 'stopped'
        id: bump
        run: |
          set -euo pipefail
          CURRENT=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::mod_version=$CURRENT is not strict X.Y.Z — refusing to auto-bump"
            exit 1
          fi
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^mod_version=.*/mod_version=$NEW/" gradle.properties
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped mod_version: $CURRENT -> $NEW"

      - name: Commit and push (release tick)
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && steps.final.outputs.change_kind != 'stopped' && inputs.dry_run != true
        env:
          COMMIT_MSG: ${{ steps.final.outputs.commit_message }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Apply-change writes to known dirs: .github/auto-release/, gradle.properties
          # (AIN bump), the loot table, and (for new_file items) somewhere under
          # src/main/resources/data/dungeontrain/. PATCH bump above also touches
          # gradle.properties. -A covers all.
          git add -A
          if git diff --cached --quiet; then
            echo "::error::no changes staged — apply-change.py produced no diff"
            exit 1
          fi
          git commit -m "$COMMIT_MSG (auto v$NEW_VERSION) [skip ci]"
          git push origin HEAD:main

      - name: Commit stopped state
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && steps.final.outputs.change_kind == 'stopped' && inputs.dry_run != true
        env:
          COMMIT_MSG: ${{ steps.final.outputs.commit_message }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/auto-release/state.json
          if git diff --cached --quiet; then
            echo "::notice::Cascade already stopped — state.json unchanged."
            exit 0
          fi
          git commit -m "$COMMIT_MSG [skip ci]"
          git push origin HEAD:main
          echo "::notice::Cascade stopped — no release dispatched. Next real release will resume the cascade."

      - name: Verify push landed
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && steps.final.outputs.change_kind != 'stopped' && inputs.dry_run != true
        run: |
          set -euo pipefail
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git ls-remote origin refs/heads/main | awk '{print $1}')
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "::error::push verification failed (local=$LOCAL remote=$REMOTE)"
            exit 1
          fi
          echo "Push verified: $LOCAL"

      - name: Dispatch Release workflow
        # notify_discord=false: cascade ticks silence the Discord webhook so the
        # release channel doesn't get spammed by ~22 micro-releases per cascade.
        # Modrinth + CurseForge uploads still fire (that's the point of the cascade —
        # to keep the mod fresh on "recently updated" feeds).
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && steps.final.outputs.change_kind != 'stopped' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          gh workflow run release.yml -f tag="$TAG" -f auto=true -f notify_discord=false
          echo "Dispatched release.yml with tag=$TAG auto=true notify_discord=false"

      - name: Dry-run summary
        if: (steps.decide.outputs.fire == 'true' || inputs.force == true) && inputs.dry_run == true
        env:
          COMMIT_MSG: ${{ steps.final.outputs.commit_message }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          KIND: ${{ steps.final.outputs.change_kind }}
          APPLIED_ID: ${{ steps.final.outputs.applied_id }}
          AIN_FROM: ${{ steps.apply.outputs.ain_from }}
          AIN_TO: ${{ steps.apply.outputs.ain_to }}
          BUILD_OUTCOME: ${{ steps.ain_build.outcome }}
        run: |
          echo "DRY RUN — change_kind=$KIND  applied_id=$APPLIED_ID"
          if [ -n "$AIN_FROM" ]; then
            echo "DRY RUN — AIN bump attempted: $AIN_FROM -> $AIN_TO (build outcome: ${BUILD_OUTCOME:-skipped})"
          fi
          if [ "$KIND" = "stopped" ]; then
            echo "DRY RUN — would commit stopped state: $COMMIT_MSG [skip ci]"
            echo "DRY RUN — would NOT dispatch release.yml"
          else
            echo "DRY RUN — would commit: $COMMIT_MSG (auto v$NEW_VERSION) [skip ci]"
            echo "DRY RUN — would dispatch release.yml tag=v$NEW_VERSION auto=true notify_discord=false"
          fi
          echo "DRY RUN — diff preview:"
          git --no-pager diff --stat

  disabled-notice:
    # Leaves a visible breadcrumb in the Actions UI when the cascade is killed
    # via the AUTO_RELEASE_ENABLED repo variable. Skipped jobs alone are easy
    # to miss; this job surfaces a notice annotation on every tick the kill
    # switch is active.
    if: vars.AUTO_RELEASE_ENABLED == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Cascade is disabled
        run: |
          echo "::notice::Auto-release cascade is DISABLED via repo variable AUTO_RELEASE_ENABLED=false."
          echo "::notice::Set the variable to 'always', 'with-content', or 'ain' (or unset) to re-enable."
