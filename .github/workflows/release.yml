name: Release

# Releases are dispatch-only. There is intentionally no `push: tags` trigger:
# the release workflow is the SOURCE of tags, not a consumer. A tag pushed by
# any other path (manual `git tag && push`, `gh release create`, stray script)
# becomes a visible orphan with no release attached — see CLAUDE.md
# "Releasing (post-Gate 3)" for the supported flow.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create + release (e.g. v0.142.0). Will be created from main HEAD — must NOT already exist."
        required: true
        type: string
      auto:
        description: "Set true when dispatched by the auto-release cascade. Manual dispatches leave this false so auto-release-reset.yml resets the cascade anchor."
        required: false
        type: boolean
        default: false
      notify_discord:
        description: "Send Discord notification on completion. Defaults to true for manual releases. The auto-release cascade always dispatches with notify_discord=false to keep the release channel quiet — only real (operator-dispatched) releases ping Discord. Override to false on a manual run to silence one hotfix."
        required: false
        type: boolean
        default: true
      changelog:
        description: "Custom release notes (Markdown). When non-empty, overrides the auto-generated commit notes for the GitHub Release body + Modrinth/CurseForge changelog. Use for operator-curated, player-facing release notes."
        required: false
        type: string
        default: ""
      test_release:
        description: "Test build: publish to the ALPHA channel and leave the changelog ledger untouched. Use to verify platform behaviour (e.g. that required dependencies auto-install) before a real release. Note neither platform has a private channel — alpha is publicly visible, just off CurseForge's default Release filter."
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # dispatch release-modpack.yml after a successful mod upload
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v3

      - name: Verify input tag matches mod_version on main
        run: |
          TAG="${RELEASE_TAG#v}"
          GRADLE_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          if [ "$TAG" != "$GRADLE_VERSION" ]; then
            echo "::error::Input tag $RELEASE_TAG does not match mod_version=$GRADLE_VERSION on main. Bump gradle.properties to $TAG (or re-dispatch with tag=v$GRADLE_VERSION) before releasing."
            exit 1
          fi

      - name: Check tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists on remote (likely an orphan from before the dispatch-only flow). Delete it first: gh api -X DELETE repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
            exit 1
          fi

      # Feeds both mc-publish's `version-type:` and the GitHub Release `prerelease:` flag.
      - name: Compute release type from tag
        id: release_type
        env:
          IS_TEST: ${{ inputs.test_release }}
        run: |
          TAG_NUMERIC="${RELEASE_TAG#v}"
          MAJOR="${TAG_NUMERIC%%.*}"
          # A test build goes to the alpha channel regardless of version. CurseForge instances
          # default to the Release channel, so an alpha file isn't offered to ordinary users —
          # the quietest either platform allows (neither has a private published file).
          if [ "$IS_TEST" = "true" ]; then
            echo "type=alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Release type: alpha (test_release=true, tag $RELEASE_TAG)"
          elif [ "$MAJOR" -gt 0 ] 2>/dev/null; then
            echo "type=release" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Release type: release (tag $RELEASE_TAG, MAJOR=$MAJOR > 0)"
          else
            echo "type=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Release type: beta (tag $RELEASE_TAG, MAJOR=$MAJOR — pre-1.0)"
          fi

      - run: ./gradlew build --no-daemon

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          if [ -n "$CHANGELOG_INPUT" ]; then
            printf '%s\n' "$CHANGELOG_INPUT" > release-notes.md
            echo "Using operator-provided changelog input ($(wc -c < release-notes.md) bytes)."
          else
            gh api -X POST \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish=main \
              --jq .body > release-notes.md
            if [ ! -s release-notes.md ]; then
              echo "Initial release — no prior tag to diff against." > release-notes.md
            fi
          fi
          echo "::group::Generated release notes"
          cat release-notes.md
          echo "::endgroup::"

      # CurseForge's "Changelog" tab shows only the LATEST file's changelog, and the latest
      # file is perpetually an auto-release cascade tick (which has no curated notes of its own).
      # So on cascade ticks we carry forward the last real release's curated notes — verbatim —
      # keeping that view meaningful. Real (operator-curated) releases use their own notes.
      # CurseForge ONLY: Modrinth shows full version history (release-notes.md, unchanged) and the
      # GitHub Release keeps its compare-link on cascade ticks. The modpack changelogs (header +
      # platform-appropriate notes) mirror this: CurseForge modpack carries the carry-forward
      # notes; Modrinth modpack mirrors the mod's Modrinth notes.
      - name: Compose CurseForge + modpack changelogs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          CHANGELOG_INPUT: ${{ inputs.changelog }}
        run: |
          if [ -n "$CHANGELOG_INPUT" ]; then
            cp release-notes.md curseforge-notes.md
          else
            LAST=$(python3 scripts/release-notes/render-last-released.py)
            if [ -n "$LAST" ]; then
              printf '%s\n' "$LAST" > curseforge-notes.md
            else
              cp release-notes.md curseforge-notes.md
            fi
          fi
          echo "::group::CurseForge mod changelog"; cat curseforge-notes.md; echo "::endgroup::"

          MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          HEADER="Dungeon Train modpack ${RELEASE_TAG} — bundles Dungeon Train ${RELEASE_TAG} + Sable for NeoForge ${MC_VERSION}."
          { printf '%s\n\n---\n\n' "$HEADER"; cat curseforge-notes.md; } > modpack-cf-notes.md
          { printf '%s\n\n---\n\n' "$HEADER"; cat release-notes.md;    } > modpack-mr-notes.md
          echo "::group::Modpack changelogs"
          echo '[CurseForge]'; cat modpack-cf-notes.md
          echo; echo '[Modrinth]'; cat modpack-mr-notes.md
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Dungeon Train ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: build/libs/dungeontrain-*.jar
          fail_on_unmatched_files: true
          prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}

      - name: Check wiki publish prerequisites
        id: wiki_check
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          if [ -n "$WIKI_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::WIKI_TOKEN secret not set — skipping wiki publish."
          fi

      - name: Publish wiki Downloads pages
        if: steps.wiki_check.outputs.ready == 'true'
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: bash scripts/publish-wiki.sh

      - name: Check mod-platform publish prerequisites
        id: publish_check
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: |
          MODRINTH_READY=false
          CURSEFORGE_READY=false
          if [ -n "$MODRINTH_TOKEN" ] && [ -n "$MODRINTH_PROJECT_ID" ]; then
            MODRINTH_READY=true
          else
            echo "::warning::Modrinth secret/variable missing — skipping Modrinth publish."
          fi
          if [ -n "$CURSEFORGE_TOKEN" ] && [ -n "$CURSEFORGE_PROJECT_ID" ]; then
            CURSEFORGE_READY=true
          else
            echo "::warning::CurseForge secret/variable missing — skipping CurseForge publish."
          fi
          echo "modrinth=$MODRINTH_READY" >> "$GITHUB_OUTPUT"
          echo "curseforge=$CURSEFORGE_READY" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth + CurseForge
        id: mcpublish
        if: steps.publish_check.outputs.modrinth == 'true' || steps.publish_check.outputs.curseforge == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.publish_check.outputs.modrinth == 'true' && vars.MODRINTH_PROJECT_ID || '' }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.publish_check.outputs.curseforge == 'true' && vars.CURSEFORGE_PROJECT_ID || '' }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/dungeontrain-*.jar
          name: Dungeon Train ${{ env.RELEASE_TAG }}
          version: ${{ env.RELEASE_TAG }}
          version-type: ${{ steps.release_type.outputs.type }}
          changelog-file: release-notes.md
          # CurseForge-only override (target-specific input — same mechanism as curseforge-id).
          # On cascade ticks this is the carried-forward last-real-release notes so CurseForge's
          # latest-file Changelog tab stays meaningful; on real releases it equals release-notes.md.
          # If unsupported, mc-publish falls back to changelog-file — i.e. today's behavior.
          curseforge-changelog-file: curseforge-notes.md
          loaders: neoforge
          game-versions: 1.21.1
          # Sibling mods are external required downloads (no longer jarJar'd), so each
          # is declared `required` — that is what makes the Modrinth/CurseForge apps
          # fetch them and credit the download to their own project pages.
          # discordpresence is absent from both lists: it is still embedded in the jar.
          # NOTE: AIN's Modrinth slug is `adventureitemnames` (no hyphens) while its
          # CurseForge slug is `adventure-item-names`; AIS is `adventure-items-stats` on
          # Modrinth vs `adventure-item-stats` on CurseForge. The spellings differ per
          # platform on purpose — don't "fix" one to match the other.
          dependencies: |
            sable(required)
            adventureitemnames(required)
            adventure-items-stats(required)
            interactive-player-mobs(required)
            ender-chest-persistence(required)
          curseforge-dependencies: |
            sable(required)
            adventure-item-names(required)
            adventure-item-stats(required)
            interactive-player-mobs(required)
            ender-chest-persistence(required)
            appleskin(optional)
            ferritecore(optional)
            modernfix(optional)
            ambientsounds(optional)
            creativecore(optional)
            advancement-plaques(optional)
            iceberg(optional)
            distant-horizons(optional)
            tectonic(optional)
            mouse-tweaks(optional)
            jade(optional)
            lithostitched(optional)
            controlling(optional)
            searchables(optional)
            equipment-compare(optional)
            item-highlighter(optional)
            pick-up-notifier(optional)
            puzzles-lib(optional)
            smooth-swapping(optional)
            overloaded-armor-bar(optional)
            kinetic-hosting-integration(optional)
            sit(optional)
          java: 21
          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn

      # Mirror every mod release into the CurseForge modpack. Dispatches
      # release-modpack.yml (which waits ~15 min for CurseForge to approve the DT
      # file, then publishes a matching modpack version bundling that file + pinned
      # Sable). Fires for EVERY release — real and auto-release cascade alike — but
      # only when the CurseForge mod upload actually produced a file id: mc-publish
      # uses fail-mode: warn, so a CurseForge hiccup leaves curseforge-version empty
      # and we skip the modpack rather than reference a file that never uploaded.
      # Requires actions: write (added to this job's permissions) to dispatch.
      - name: Dispatch modpack release
        if: ${{ success() && steps.publish_check.outputs.curseforge == 'true' && steps.mcpublish.outputs.curseforge-version != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          DT_FILE_ID: ${{ steps.mcpublish.outputs.curseforge-version }}
          IS_AUTO: ${{ inputs.auto }}
        run: |
          echo "Dispatching modpack release for $RELEASE_TAG (DT CurseForge file $DT_FILE_ID, auto=$IS_AUTO)…"
          gh workflow run release-modpack.yml \
            -f tag="$RELEASE_TAG" \
            -f dt_file_id="$DT_FILE_ID" \
            -f auto="$IS_AUTO" \
            -f changelog="$(cat modpack-cf-notes.md)"

      # Mirror every mod release into the Modrinth modpack too. Dispatches
      # release-modpack-modrinth.yml (the Modrinth sibling — no approval wait), which builds +
      # uploads a matching .mrpack referencing this release's DT Modrinth version + the pinned
      # companions. Gated on the Modrinth mod upload having produced a version id: mc-publish uses
      # fail-mode: warn, so a Modrinth hiccup leaves modrinth-version empty and we skip the modpack
      # rather than reference a version that never uploaded. Independent of the CurseForge dispatch
      # above — either platform can publish its modpack even if the other's mod upload failed.
      - name: Dispatch Modrinth modpack release
        if: ${{ success() && steps.publish_check.outputs.modrinth == 'true' && steps.mcpublish.outputs.modrinth-version != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          DT_MODRINTH_VERSION: ${{ steps.mcpublish.outputs.modrinth-version }}
          IS_AUTO: ${{ inputs.auto }}
        run: |
          echo "Dispatching Modrinth modpack release for $RELEASE_TAG (DT Modrinth version $DT_MODRINTH_VERSION, auto=$IS_AUTO)…"
          gh workflow run release-modpack-modrinth.yml \
            -f tag="$RELEASE_TAG" \
            -f dt_modrinth_version="$DT_MODRINTH_VERSION" \
            -f auto="$IS_AUTO" \
            -f changelog="$(cat modpack-mr-notes.md)"

      # After a successful real release (auto=false), mark the shipped changelog
      # entries released so the next release's "unreleased" set starts clean.
      # The ~22 cascade micro-releases pass auto=true and skip this, so
      # "unreleased" means "since the last real release". success() gates on the
      # GitHub Release having been created (mc-publish uses fail-mode: warn so a
      # Modrinth/CurseForge hiccup won't block this). Commits to main with
      # [skip ci] so it triggers neither version-bump.yml nor build.yml.
      #
      # test_release also skips this. A test build must NOT consume the curated
      # entries — they describe features that haven't reached players yet, and
      # marking them shipped would leave the following real release with empty
      # notes and no obvious cause.
      - name: Mark changelog entries released
        if: ${{ success() && inputs.auto == false && inputs.test_release == false }}
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          python3 scripts/release-notes/mark-released.py --released-in "$RELEASE_TAG"
          if git diff --quiet -- .github/release-notes/changelog.json; then
            echo "No changelog entries to mark — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/release-notes/changelog.json
          git commit -m "chore(release-notes): mark $RELEASE_TAG released [skip ci]"
          # The release built from main HEAD; a scheduled cascade tick could have
          # pushed in the meantime. Rebase our one-line flag flip on top and retry
          # the push once before failing.
          for attempt in 1 2; do
            if git push origin HEAD:main; then
              echo "Pushed changelog update on attempt $attempt."
              exit 0
            fi
            if [ "$attempt" = "2" ]; then
              echo "::error::Failed to push changelog update after rebase retry."
              exit 1
            fi
            echo "Push rejected — fetching and rebasing before retry."
            git fetch origin main
            git rebase origin/main
          done

      - name: Check Discord webhook prerequisites
        id: discord_check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DISCORD_WEBHOOK_URL secret not set — skipping Discord notification."
          fi

      # always() so partial-failure releases still notify (with ⚠️ markers
      # on the platforms that didn't get the upload). RELEASE_TAG guard
      # suppresses notify if the workflow exploded before tag verification.
      # notify_discord guard: the auto-release cascade always passes
      # notify_discord=false so cascade ticks skip this step entirely; manual
      # releases default to true and can override to false for a quiet hotfix.
      - name: Notify Discord
        if: ${{ always() && steps.discord_check.outputs.ready == 'true' && env.RELEASE_TAG != '' && inputs.notify_discord }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
          PRERELEASE: ${{ steps.release_type.outputs.prerelease }}
          MODRINTH_VERSION: ${{ steps.mcpublish.outputs.modrinth-version }}
          CURSEFORGE_VERSION: ${{ steps.mcpublish.outputs.curseforge-version }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/notify-discord.sh
