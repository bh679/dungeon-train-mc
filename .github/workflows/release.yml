name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.70.0). Must already exist in the repo."
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Cache Forge Gradle artifacts
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/forge_gradle
          key: forge-gradle-${{ runner.os }}-${{ hashFiles('build.gradle', 'gradle.properties') }}
          restore-keys: |
            forge-gradle-${{ runner.os }}-

      - name: Verify tag matches mod_version
        run: |
          TAG="${RELEASE_TAG#v}"
          GRADLE_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          if [ "$TAG" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag $RELEASE_TAG does not match mod_version=$GRADLE_VERSION in gradle.properties"
            exit 1
          fi

      - run: ./gradlew build --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Dungeon Train ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: build/libs/dungeontrain-*.jar
          fail_on_unmatched_files: true

      - name: Check wiki publish prerequisites
        id: wiki_check
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          if [ -n "$WIKI_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::WIKI_TOKEN secret not set — skipping wiki publish."
          fi

      - name: Publish wiki Downloads pages
        if: steps.wiki_check.outputs.ready == 'true'
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: bash scripts/publish-wiki.sh

      - name: Check mod-platform publish prerequisites
        id: publish_check
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: |
          MODRINTH_READY=false
          CURSEFORGE_READY=false
          if [ -n "$MODRINTH_TOKEN" ] && [ -n "$MODRINTH_PROJECT_ID" ]; then
            MODRINTH_READY=true
          else
            echo "::warning::Modrinth secret/variable missing — skipping Modrinth publish."
          fi
          if [ -n "$CURSEFORGE_TOKEN" ] && [ -n "$CURSEFORGE_PROJECT_ID" ]; then
            CURSEFORGE_READY=true
          else
            echo "::warning::CurseForge secret/variable missing — skipping CurseForge publish."
          fi
          echo "modrinth=$MODRINTH_READY" >> "$GITHUB_OUTPUT"
          echo "curseforge=$CURSEFORGE_READY" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth + CurseForge
        if: steps.publish_check.outputs.modrinth == 'true' || steps.publish_check.outputs.curseforge == 'true'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ steps.publish_check.outputs.modrinth == 'true' && vars.MODRINTH_PROJECT_ID || '' }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: ${{ steps.publish_check.outputs.curseforge == 'true' && vars.CURSEFORGE_PROJECT_ID || '' }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: build/libs/dungeontrain-*.jar
          name: Dungeon Train ${{ env.RELEASE_TAG }}
          version: ${{ env.RELEASE_TAG }}
          version-type: release
          loaders: forge
          game-versions: 1.20.1
          dependencies: |
            valkyrien-skies(required)
            kotlin-for-forge(required)
          java: 17
          retry-attempts: 2
          retry-delay: 10000
          fail-mode: warn
