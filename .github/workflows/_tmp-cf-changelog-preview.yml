name: TEMP — CurseForge changelog preview

# TEMPORARY, DELETE BEFORE MERGE. Previews the carried-forward CurseForge changelog
# on the LIVE mod page before merging dev/curseforge-changelog-carry-forward, so we can
# confirm the rendered result in the CurseForge app/site.
#
# It calls CurseForge's update-file API to set the *latest* mod file's changelog to the
# last real release's curated notes (render-last-released.py output) — the same content
# the merged pipeline will publish on future cascade-tick uploads. NOTE: this exercises
# the update-file path, not mc-publish's curseforge-changelog-file on a new upload; it
# proves the rendered result, not that specific mc-publish input.
#
# Push-triggered (workflow_dispatch on a non-default branch isn't dispatchable). The paths
# filter means only commits touching THIS file fire it, so later branch commits won't
# re-run it. Deleting this file (before merge) stops it entirely.

on:
  push:
    branches: [dev/curseforge-changelog-carry-forward]
    paths: ['.github/workflows/_tmp-cf-changelog-preview.yml']

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set latest mod file changelog on CurseForge
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
        run: |
          set -euo pipefail
          [ -n "${CURSEFORGE_TOKEN:-}" ]      || { echo "::error::CURSEFORGE_TOKEN secret not set";     exit 1; }
          [ -n "${CURSEFORGE_PROJECT_ID:-}" ] || { echo "::error::CURSEFORGE_PROJECT_ID var not set";   exit 1; }

          # Resolve the current latest mod file (what the Changelog tab shows). Fall back
          # to the known latest if the no-key listing API is unavailable from the runner.
          FILE_ID=$(curl -sS -H "User-Agent: dt-ci-preview" -H "Accept: application/json" \
            "https://www.curseforge.com/api/v1/mods/${CURSEFORGE_PROJECT_ID}/files?pageIndex=0&pageSize=1&sort=dateCreated&sortDescending=true" \
            | jq -r '.data[0].id // empty' || true)
          if ! [[ "${FILE_ID:-}" =~ ^[0-9]+$ ]]; then
            echo "::warning::could not resolve latest file id (got '${FILE_ID:-}'); falling back to 8298333"
            FILE_ID=8298333
          fi
          echo "Target CurseForge file: $FILE_ID (project $CURSEFORGE_PROJECT_ID)"

          CHANGELOG=$(python3 scripts/release-notes/render-last-released.py)
          [ -n "$CHANGELOG" ] || { echo "::error::render-last-released.py produced no notes"; exit 1; }
          echo "::group::Changelog to publish"; printf '%s\n' "$CHANGELOG"; echo "::endgroup::"

          jq -nc --argjson fileID "$FILE_ID" --arg cl "$CHANGELOG" \
            '{fileID: $fileID, changelog: $cl, changelogType: "markdown"}' > metadata.json
          echo "metadata.json bytes: $(wc -c < metadata.json)"

          # Send metadata as a typed application/json part (mirrors publish-modrinth.sh's
          # working `data=<file;type=...` form). The inline plain-field form 500'd.
          RESP=$(curl -sS -w $'\n%{http_code}' \
            -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            -F "metadata=<metadata.json;type=application/json" \
            "https://minecraft.curseforge.com/api/projects/${CURSEFORGE_PROJECT_ID}/update-file")
          CODE=$(printf '%s' "$RESP" | tail -n1)
          BODY=$(printf '%s' "$RESP" | sed '$d')
          echo "HTTP $CODE: $BODY"
          [ "$CODE" = "200" ] || { echo "::error::update-file failed (HTTP $CODE)"; exit 1; }
          echo "✓ Updated changelog on file $FILE_ID — check the CurseForge mod Changelog tab."
