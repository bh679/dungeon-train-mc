name: _modpack-smoketest (TEMPORARY — delete before PR)

# Throwaway: validates the real CurseForge modpack upload path on the branch using the
# existing CURSEFORGE_TOKEN secret (workflow_dispatch can't fire until the workflow is on
# main). Push-triggered + path-scoped so only adding/editing THIS file triggers it — it
# runs the real upload exactly once. Deleted before the PR; squash-merge erases it from main.
# Round 2: confirms CurseForge accepts the upload WITH relations (deps) declared.
on:
  push:
    branches: [claude/cool-moser-0a404f]
    paths: ['.github/workflows/_modpack-smoketest.yml']

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render manifest (DT v0.292.0 file 8245396 + pinned Sable)
        run: |
          python3 scripts/modpack/build-manifest.py \
            --dt-file-id 8245396 --version v0.292.0 --output manifest.json
          echo "::group::manifest.json"
          cat manifest.json
          echo "::endgroup::"

      - name: Publish to CurseForge (REAL upload, uses the gh secret)
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_MODPACK_PROJECT_ID: ${{ vars.CURSEFORGE_MODPACK_PROJECT_ID }}
        run: |
          bash scripts/modpack/publish-curseforge.sh \
            --manifest manifest.json \
            --tag v0.292.0 \
            --changelog "Pipeline smoke-test (with relations): Dungeon Train 0.292.0 + Sable 1.2.1, deps declared."
