name: _smoke Modrinth upload (TEMP — delete before merge)

# TEMPORARY pre-merge REAL upload test. release-modpack-modrinth.yml is dispatch-only and not on
# the default branch yet, so this push-triggered job runs the production scripts with the real
# MODRINTH_TOKEN to publish the inaugural 0.339.0 modpack version to project bEFyz3ji. The project
# is a draft, so the version is private (not public / not in review) until the owner submits it.
# DELETE this file before the Gate 3 merge.

on:
  push:
    branches: [dev/modrinth-modpack-release]
    paths:
      - ".github/workflows/_smoke-modrinth-upload.yml"

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve current DT Modrinth version (0.339.0 build)
        id: dt
        run: |
          DT_VER=$(python3 - <<'PY'
          import json, urllib.request
          url = ("https://api.modrinth.com/v2/project/dungeon-train/version"
                 "?loaders=%5B%22neoforge%22%5D&game_versions=%5B%221.21.1%22%5D")
          req = urllib.request.Request(url, headers={"User-Agent": "dt-smoke/1.0"})
          v = json.load(urllib.request.urlopen(req))[0]
          print(f"{v['id']} {v['files'][0]['filename']}")
          PY
          )
          ID=$(echo "$DT_VER" | cut -d' ' -f1)
          FN=$(echo "$DT_VER" | cut -d' ' -f2)
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "Resolved DT Modrinth version: $ID ($FN)"

      - name: Render Modrinth modpack index (v0.339.0)
        run: |
          python3 scripts/modpack/build-mrpack.py \
            --dt-version "${{ steps.dt.outputs.id }}" \
            --version v0.339.0 \
            --output modrinth.index.json
          echo "::group::Rendered modrinth.index.json"
          cat modrinth.index.json
          echo "::endgroup::"

      - name: Publish to Modrinth (REAL upload)
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_MODPACK_PROJECT_ID: ${{ vars.MODRINTH_MODPACK_PROJECT_ID }}
        run: |
          if [ -z "${MODRINTH_MODPACK_PROJECT_ID:-}" ]; then
            echo "::error::MODRINTH_MODPACK_PROJECT_ID variable is not set."; exit 1
          fi
          if [ -z "${MODRINTH_TOKEN:-}" ]; then
            echo "::error::MODRINTH_TOKEN secret is not set."; exit 1
          fi
          bash scripts/modpack/publish-modrinth.sh --index modrinth.index.json --tag v0.339.0

      - name: Verify the version is on the project
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_MODPACK_PROJECT_ID: ${{ vars.MODRINTH_MODPACK_PROJECT_ID }}
        run: |
          python3 - "$MODRINTH_MODPACK_PROJECT_ID" "$MODRINTH_TOKEN" <<'PY'
          import json, sys, urllib.request
          pid, token = sys.argv[1], sys.argv[2]
          req = urllib.request.Request(
              f"https://api.modrinth.com/v2/project/{pid}/version",
              headers={"Authorization": token, "User-Agent": "dt-smoke/1.0"})
          vs = json.load(urllib.request.urlopen(req))
          rows = [(v.get("version_number"), v.get("id"), v.get("status")) for v in vs]
          print("Project versions:", rows)
          assert any(v.get("version_number") == "0.339.0" for v in vs), "0.339.0 not found on project"
          print("OK: 0.339.0 is published on the modpack project.")
          PY
