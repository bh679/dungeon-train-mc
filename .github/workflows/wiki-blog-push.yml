name: Push Blog Post to Wiki

on:
  push:
    branches:
      - 'claude/amazing-goodall-0r5jok'
    paths:
      - '.github/wiki-content/*.md'
  workflow_dispatch:

jobs:
  push-to-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone wiki
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            /tmp/wiki

      - name: Copy blog post
        run: |
          cp .github/wiki-content/Blog-2026-06-23-Nether-Arrives.md \
             /tmp/wiki/Blog-2026-06-23-Nether-Arrives.md

      - name: Update Blog index
        shell: python3 {0}
        run: |
          import os, re

          blog_md = "/tmp/wiki/Blog.md"
          entry   = "- [2026-06-23 — The Nether Arrives](Blog-2026-06-23-Nether-Arrives)"

          if not os.path.exists(blog_md):
              content = """\
[Home](Home) > Blog

# Dev Blog

Updates from the Dungeon Train development team.

## 2026

""" + entry + "\n"
          else:
              content = open(blog_md).read()
              if entry in content:
                  print("Entry already present.")
              elif "## 2026" in content:
                  content = content.replace("## 2026\n", "## 2026\n" + entry + "\n", 1)
              else:
                  m = re.search(r'^## ', content, re.MULTILINE)
                  if m:
                      content = content[:m.start()] + "## 2026\n\n" + entry + "\n\n" + content[m.start():]
                  else:
                      content += "\n## 2026\n\n" + entry + "\n"

          with open(blog_md, "w") as f:
              f.write(content)

      - name: Commit and push
        run: |
          cd /tmp/wiki
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "docs: blog post 2026-06-23 — The Nether Arrives"
            git push
            echo "Wiki updated."
          fi
