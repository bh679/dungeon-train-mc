name: Auto-Release Cascade Reset

# Fires after every successful Release workflow run that was NOT dispatched
# by the auto-release cascade. Rewrites .github/auto-release/state.json so
# the next cascade is anchored on this release's completion time.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

concurrency:
  group: auto-release-reset
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    # Only reset on successful manual releases. Cascade-dispatched releases are
    # filtered inside the job because `workflow_run` webhook payloads don't
    # carry the triggering dispatch's `inputs.*` — see "Detect cascade dispatch"
    # step below for the head_sha-based replacement.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'workflow_dispatch'
    steps:
      - name: Detect cascade dispatch + derive tag
        id: trig
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `workflow_run` webhook payloads omit the triggering dispatch's
          # `inputs.*`, and the REST runs endpoint doesn't expose them either,
          # so `github.event.workflow_run.inputs.auto`/`.tag` are always empty.
          # Detect cascade dispatches by inspecting the commit release.yml ran
          # against: the cascade always commits `chore(auto): ...` immediately
          # before dispatching, while manual releases dispatch off a normal
          # Gate 3 / merge commit.
          msg=$(gh api "/repos/$REPO/commits/$HEAD_SHA" --jq '.commit.message' | head -1)
          echo "Head commit message: $msg"
          if echo "$msg" | grep -qE '^chore\(auto\):'; then
            echo "auto=true" >> "$GITHUB_OUTPUT"
            echo "Cascade dispatch detected — reset will be skipped."
          else
            echo "auto=false" >> "$GITHUB_OUTPUT"
          fi
          # release.yml enforces tag == v<mod_version> on its checkout of main,
          # so reading gradle.properties at the same head_sha gives the tag the
          # release published under.
          encoded=$(gh api "/repos/$REPO/contents/gradle.properties?ref=$HEAD_SHA" --jq '.content')
          version=$(echo "$encoded" | base64 -d | grep '^mod_version=' | cut -d= -f2 | tr -d '[:space:]')
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Derived release tag: v$version"

      - uses: actions/checkout@v4
        if: steps.trig.outputs.auto != 'true'
        with:
          ref: main
          fetch-depth: 0

      - name: Rewrite state.json
        if: steps.trig.outputs.auto != 'true'
        env:
          ANCHOR: ${{ github.event.workflow_run.updated_at }}
          TAG: ${{ steps.trig.outputs.tag }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime

          anchor_in = os.environ["ANCHOR"]
          if anchor_in.endswith("Z"):
              dt = datetime.fromisoformat(anchor_in[:-1] + "+00:00")
          else:
              dt = datetime.fromisoformat(anchor_in)
          anchor_iso = dt.strftime("%Y-%m-%dT%H:%M:%SZ")

          state = {
              "schedule_anchor": anchor_iso,
              "last_auto_release_at": None,
              "last_anchor_source": f"real_release_{os.environ['TAG']}",
              "cascade_stopped": False,
          }
          with open(".github/auto-release/state.json", "w") as f:
              json.dump(state, f, indent=2)
              f.write("\n")
          PY

      - name: Commit and push
        if: steps.trig.outputs.auto != 'true'
        env:
          TAG: ${{ steps.trig.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .github/auto-release/state.json; then
            echo "No state change — skipping commit."
            exit 0
          fi
          git add .github/auto-release/state.json
          git commit -m "chore(auto): reset cascade anchor after $TAG [skip ci]"
          git push origin HEAD:main
