name: Release Modpack (Modrinth)

# Publishes the Dungeon Train MODRINTH modpack (project = vars.MODRINTH_MODPACK_PROJECT_ID),
# the Modrinth sibling of release-modpack.yml (CurseForge). Dispatched by release.yml right
# after a successful Modrinth mod upload — for EVERY release, including the auto-release cascade
# ticks. Unlike CurseForge there is NO approval wait: Modrinth versions are available the moment
# they upload, so the .mrpack can reference the freshly uploaded DT version immediately.
#
# A .mrpack references each mod by Modrinth download URL + hashes (resolved at build time from the
# pins in modpack.config.json), so this passes the DT *Modrinth version id* (not a CurseForge file
# id). Not tag-triggered: release.yml is the only production caller. Can also be dispatched manually
# (e.g. with dry_run=true) for testing — see modpack/README.md.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag the modpack should mirror (e.g. v0.293.0)."
        required: true
        type: string
      dt_modrinth_version:
        description: "Modrinth version id of the Dungeon Train jar uploaded by this release."
        required: true
        type: string
      auto:
        description: "True when dispatched by the auto-release cascade (informational only)."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Build + validate the pack but skip the Modrinth upload."
        required: false
        type: boolean
        default: false

# Dedupe re-dispatches of the SAME tag (a re-run supersedes the in-flight one), but let
# different releases publish independently — every release gets its own modpack version.
concurrency:
  group: modpack-modrinth-release-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  publish-modpack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # No explicit ref: checks out the dispatch ref — main in production (release.yml
      # dispatches without --ref), or the feature branch when testing via `gh workflow run
      # --ref <branch>`. This is why the build scripts are reachable during branch testing.
      - uses: actions/checkout@v4

      - name: Validate inputs
        env:
          DT_MODRINTH_VERSION: ${{ inputs.dt_modrinth_version }}
        run: |
          # Modrinth version ids are base62 (e.g. v7dkAQNz); reject anything else early.
          if ! [[ "$DT_MODRINTH_VERSION" =~ ^[A-Za-z0-9]+$ ]]; then
            echo "::error::dt_modrinth_version must be a base62 Modrinth version id, got '$DT_MODRINTH_VERSION'"; exit 1
          fi

      - name: Render Modrinth modpack index
        env:
          TAG: ${{ inputs.tag }}
          DT_MODRINTH_VERSION: ${{ inputs.dt_modrinth_version }}
        run: |
          python3 scripts/modpack/build-mrpack.py \
            --dt-version "$DT_MODRINTH_VERSION" \
            --version "$TAG" \
            --output modrinth.index.json
          echo "::group::Rendered modrinth.index.json"
          cat modrinth.index.json
          echo "::endgroup::"

      - name: Publish modpack to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_MODPACK_PROJECT_ID: ${{ vars.MODRINTH_MODPACK_PROJECT_ID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          TAG: ${{ inputs.tag }}
        run: |
          if [ -z "${MODRINTH_MODPACK_PROJECT_ID:-}" ]; then
            echo "::error::MODRINTH_MODPACK_PROJECT_ID variable is not set — cannot publish the modpack."
            exit 1
          fi
          if [ -z "${MODRINTH_TOKEN:-}" ] && [ "${DRY_RUN:-}" != "1" ]; then
            echo "::error::MODRINTH_TOKEN secret is not set — cannot publish the modpack."
            exit 1
          fi
          bash scripts/modpack/publish-modrinth.sh --index modrinth.index.json --tag "$TAG"
